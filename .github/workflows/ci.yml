name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Smoke boot
        run: |
          node bin/ai-dashboard.js --registry examples/simple/registry.toml --port 3492 &
          DASHPID=$!
          sleep 2
          curl -fsS http://127.0.0.1:3492/health
          curl -fsS http://127.0.0.1:3492/api/meta
          curl -fsS http://127.0.0.1:3492/api/organs/health
          kill $DASHPID

      - name: Version smoke
        run: node bin/ai-dashboard.js --version
